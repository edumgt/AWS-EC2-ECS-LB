name: Deploy ECS via AWS CLI

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string
  push:
    branches: ["main"]
    paths:
      - "BE-fastapi/**"
      - "deploy/**"
      - ".github/workflows/deploy-ecs-aws-cli.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  TASK_FAMILY: ${{ vars.TASK_FAMILY }}
  ECR_REPO: ${{ vars.ECR_REPO }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  CONTAINER_PORT: ${{ vars.CONTAINER_PORT || '8000' }}
  CPU: ${{ vars.CPU || '256' }}
  MEMORY: ${{ vars.MEMORY || '512' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve values
        id: vars
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TAG_INPUT='${{ github.event.inputs.image_tag }}'
          if [ -n "${TAG_INPUT}" ]; then
            IMAGE_TAG="${TAG_INPUT}"
          else
            IMAGE_TAG="${GITHUB_SHA::7}"
          fi
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "${ECR_REPO}" --region "${AWS_REGION}" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "${ECR_REPO}" \
            --image-scanning-configuration scanOnPush=true \
            --region "${AWS_REGION}"

      - name: Login to ECR
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" | \
          docker login --username AWS --password-stdin "${{ steps.vars.outputs.ecr_registry }}"

      - name: Build and push image
        run: |
          set -euo pipefail
          docker build -t "${ECR_REPO}:${{ steps.vars.outputs.image_tag }}" ./BE-fastapi
          docker tag "${ECR_REPO}:${{ steps.vars.outputs.image_tag }}" "${{ steps.vars.outputs.image_uri }}"
          docker push "${{ steps.vars.outputs.image_uri }}"

      - name: Render task definition
        run: |
          cat > taskdef.json <<JSON
          {
            "family": "${TASK_FAMILY}",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "${CPU}",
            "memory": "${MEMORY}",
            "executionRoleArn": "arn:aws:iam::${{ steps.vars.outputs.account_id }}:role/ecsTaskExecutionRole",
            "containerDefinitions": [
              {
                "name": "${CONTAINER_NAME}",
                "image": "${{ steps.vars.outputs.image_uri }}",
                "essential": true,
                "portMappings": [
                  {
                    "containerPort": ${CONTAINER_PORT},
                    "protocol": "tcp"
                  }
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/${ECS_SERVICE}",
                    "awslogs-region": "${AWS_REGION}",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }
            ]
          }
          JSON

      - name: Register task definition
        id: taskdef
        run: |
          set -euo pipefail
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --region "${AWS_REGION}" \
            --cli-input-json file://taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --region "${AWS_REGION}" \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${{ steps.taskdef.outputs.task_def_arn }}" \
            --force-new-deployment

      - name: Wait until service is stable
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --region "${AWS_REGION}" \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

      - name: Summary
        run: |
          echo "Deploy done"
          echo "Image: ${{ steps.vars.outputs.image_uri }}"
          echo "TaskDef: ${{ steps.taskdef.outputs.task_def_arn }}"
